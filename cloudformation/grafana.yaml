AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Managed Grafana Workspace with SNS Alerting

Parameters:
  WorkspaceName:
    Type: String
    Default: aws-grafana-workspace

Resources:
  GrafanaWorkspaceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GrafanaWorkspaceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: grafana.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchReadOnlyAccess
      Policies:
        - PolicyName: AllowSNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !ImportValue GrafanaAlertTopicArn

  GrafanaWorkspace:
    Type: AWS::Grafana::Workspace
    Properties:
      Name: !Ref WorkspaceName
      AccountAccessType: CURRENT_ACCOUNT
      AuthenticationProviders:
        - AWS_SSO
      PermissionType: CUSTOMER_MANAGED
      RoleArn: !GetAtt GrafanaWorkspaceRole.Arn
      DataSources:
        - CLOUDWATCH
      NotificationDestinations:
        - SNS
      GrafanaVersion: "10.4"
      

Outputs:
  GrafanaWorkspaceId:
    Description: Grafana Workspace ID
    Value: !Ref GrafanaWorkspace

  GrafanaWorkspaceEndpoint:
    Description: Grafana Workspace URL
    Value: !GetAtt GrafanaWorkspace.Endpoint